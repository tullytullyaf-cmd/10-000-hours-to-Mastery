<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Mastery Tracker</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        h1 { text-align: center; font-size: 24px; color: #333; }
        
        .setup-area { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        input[type="text"] { padding: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .row { display: flex; gap: 10px; align-items: center; }
        input[type="color"] { width: 50px; height: 50px; border: none; background: none; }
        
        .btn-create { background: #333; color: white; padding: 15px; border-radius: 10px; border: none; font-weight: bold; flex-grow: 1; font-size: 16px; }

        .skill-card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; border-left: 8px solid; }
        .progress-bg { background: #eee; height: 15px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.5s; }
        
        .controls { display: flex; gap: 10px; margin-top: 10px; }
        .input-hrs { width: 80px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-add { background: #333; color: white; padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mastery Tracker</h1>
    
    <div class="setup-area">
        <input type="text" id="new-skill-name" placeholder="Skill Name (e.g. Spanish)">
        <div class="row">
            <input type="color" id="skill-color" value="#4CAF50">
            <button class="btn-create" onclick="createSkill()">Create Skill</button>
        </div>
    </div>

    <div id="skills-list"></div>
</div>

<script>
    let skills = JSON.parse(localStorage.getItem('masteryDataV3')) || {};

    function updateUI() {
        const list = document.getElementById('skills-list');
        list.innerHTML = '';
        for (let name in skills) {
            let data = skills[name];
            let percent = Math.min((data.hours / 10000) * 100, 100).toFixed(1);
            list.innerHTML += `
                <div class="skill-card" style="border-left-color: ${data.color}">
                    <div style="display:flex; justify-content:space-between">
                        <strong>${name}</strong>
                        <span>${data.hours} hrs</span>
                    </div>
                    <div class="progress-bg"><div class="progress-fill" style="width:${percent}%; background:${data.color}"></div></div>
                    <div class="controls">
                        <input type="number" class="input-hrs" id="add-${name}" placeholder="Hrs">
                        <button class="btn-add" style="background:${data.color}" onclick="addHours('${name}')">Add</button>
                        <button onclick="deleteSkill('${name}')" style="margin-left:auto; background:none; border:none; color:#ccc;">✕</button>
                    </div>
                </div>`;
        }
        localStorage.setItem('masteryDataV3', JSON.stringify(skills));
    }

    function createSkill() {
        const name = document.getElementById('new-skill-name').value.trim();
        const color = document.getElementById('skill-color').value;
        if (name && !skills[name]) {
            skills[name] = { hours: 0, color: color };
            document.getElementById('new-skill-name').value = '';
            updateUI();
        }
    }

    function addHours(name) {
        const amt = document.getElementById(`add-${name}`).value;
        if (amt) {
            skills[name].hours += parseFloat(amt);
            document.getElementById(`add-${name}`).value = '';
            updateUI();
        }
    }

    function deleteSkill(name) {
        if(confirm('Delete ' + name + '?')) { delete skills[name]; updateUI(); }
    }

    updateUI();
</script>
</body>
</html>
